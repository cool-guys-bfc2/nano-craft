<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NanoCraft Touch</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Courier New', monospace; user-select: none; -webkit-user-select: none; }
        #hud { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 10; }
        
        /* --- TOUCH CONTROLS UI --- */
        .control-layer { position: absolute; bottom: 20px; width: 100%; height: 150px; pointer-events: none; z-index: 20; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .d-pad { position: relative; width: 150px; height: 150px; pointer-events: auto; }
        .actions { position: relative; width: 100px; height: 150px; pointer-events: auto; display: flex; align-items: flex-end; justify-content: flex-end; }

        .btn {
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            cursor: pointer;
            backdrop-filter: blur(4px);
            touch-action: manipulation; /* Prevents double-tap zoom */
        }
        .btn:active, .btn.active { background: rgba(255, 255, 255, 0.6); }

        /* D-Pad Layout */
        .btn-up { top: 0; left: 50px; width: 50px; height: 50px; }
        .btn-down { bottom: 0; left: 50px; width: 50px; height: 50px; }
        .btn-left { top: 50px; left: 0; width: 50px; height: 50px; }
        .btn-right { top: 50px; right: 0; width: 50px; height: 50px; }

        /* Action Layout */
        .btn-jump { width: 80px; height: 80px; border-radius: 50%; bottom: 0; right: 0; background: rgba(255, 200, 0, 0.4); }
        .btn-lock { width: 60px; height: 40px; top: 0; right: 0; font-size: 10px; background: rgba(255, 0, 0, 0.4); }
    </style>
</head>
<body>
    <div id="hud">
        <h3>NanoCraft 0.2</h3>
        <span id="fps">60</span> FPS | Blocks: <span id="block-count">0</span>
    </div>
    <div id="crosshair"></div>

    <!-- UI CONTROLS -->
    <div class="control-layer">
        <div class="d-pad">
            <div class="btn btn-up" id="btn-w">W</div>
            <div class="btn btn-left" id="btn-a">A</div>
            <div class="btn btn-right" id="btn-d">D</div>
            <div class="btn btn-down" id="btn-s">S</div>
        </div>
        <div class="actions">
            <div class="btn btn-lock" id="btn-lock">LOCK MOUSE</div>
            <div class="btn btn-jump" id="btn-space">JUMP</div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CONFIGURATION ---
        const WORLD_SIZE = 32;
        const MAX_HEIGHT = 8;
        
        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xaaaaaa);
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 100, 50);
        scene.add(ambient, sun);

        // --- VOXELS ---
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshStandardMaterial({ color: 0x5da644 });
        const mesh = new THREE.InstancedMesh(geometry, material, WORLD_SIZE * WORLD_SIZE * MAX_HEIGHT);
        scene.add(mesh);

        const dummy = new THREE.Object3D();
        let count = 0;
        for (let x = -WORLD_SIZE/2; x < WORLD_SIZE/2; x++) {
            for (let z = -WORLD_SIZE/2; z < WORLD_SIZE/2; z++) {
                const y = Math.floor(Math.sin(x * 0.1) * 3 + Math.cos(z * 0.1) * 3);
                for (let h = -5; h <= y; h++) {
                    dummy.position.set(x, h, z);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(count++, dummy.matrix);
                }
            }
        }
        mesh.instanceMatrix.needsUpdate = true;
        document.getElementById('block-count').innerText = count;

        // --- PHYSICS & INPUT STATE ---
        camera.position.set(0, 10, 10);
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        
        // Input State Object
        const input = { w: false, a: false, s: false, d: false, space: false };

        // --- CONTROLLER LOGIC (KEYBOARD) ---
        const onKey = (e, active) => {
            switch (e.code) {
                case 'KeyW': input.w = active; break;
                case 'KeyS': input.s = active; break;
                case 'KeyA': input.a = active; break;
                case 'KeyD': input.d = active; break;
                case 'Space': input.space = active; break;
            }
        };
        document.addEventListener('keydown', (e) => onKey(e, true));
        document.addEventListener('keyup', (e) => onKey(e, false));

        // --- CONTROLLER LOGIC (TOUCH/MOUSE UI) ---
        const bindBtn = (id, key) => {
            const btn = document.getElementById(id);
            
            // Mouse Events
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); input[key] = true; });
            btn.addEventListener('mouseup', (e) => { e.preventDefault(); input[key] = false; });
            btn.addEventListener('mouseleave', () => { input[key] = false; });

            // Touch Events (Crucial for Mobile)
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); input[key] = true; btn.classList.add('active'); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); input[key] = false; btn.classList.remove('active'); });
        };

        bindBtn('btn-w', 'w');
        bindBtn('btn-a', 'a');
        bindBtn('btn-s', 's');
        bindBtn('btn-d', 'd');
        bindBtn('btn-space', 'space');

        // Lock Button
        document.getElementById('btn-lock').addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        // Mouse Look (Only works when locked)
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                // Clamp vertical look
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        // --- GAME LOOP ---
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            // Apply Friction (Decay)
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;
            velocity.y -= 50.0 * delta; // Gravity

            // Determine Movement Direction
            direction.z = Number(input.w) - Number(input.s);
            direction.x = Number(input.d) - Number(input.a);
            direction.normalize();

            // Apply Velocity
            if (input.w || input.s) velocity.z -= direction.z * 100.0 * delta;
            if (input.a || input.d) velocity.x -= direction.x * 100.0 * delta;
            
            // Jump (Ground check simplified)
            if (input.space && camera.position.y < 6 && velocity.y < 0) {
                velocity.y = 15;
            }

            // Move Camera
            camera.translateX(-velocity.x * delta);
            camera.translateZ(velocity.z * delta);
            camera.position.y += velocity.y * delta;

            // Floor Collision
            if (camera.position.y < 5) {
                velocity.y = 0;
                camera.position.y = 5;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
