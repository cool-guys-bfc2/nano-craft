<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NanoCraft 1.4 Survival</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Courier New', monospace; user-select: none; -webkit-user-select: none; }
        #hud { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 10; mix-blend-mode: difference; }
        
        /* --- SAVE UI --- */
        #save-status { margin-top: 5px; font-size: 12px; color: #FFFF00; }
        .menu-btn { pointer-events: auto; background: #444; color: white; border: 1px solid white; padding: 5px 10px; cursor: pointer; font-family: inherit; }
        .menu-btn:hover { background: #666; }

        /* --- INVENTORY --- */
        #inventory {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px; background: rgba(0,0,0,0.6); padding: 6px; border-radius: 12px;
            pointer-events: auto; z-index: 40; min-width: 50px; min-height: 50px; justify-content: center;
        }
        .inv-slot {
            width: 45px; height: 45px; border: 2px solid #555; border-radius: 8px;
            cursor: pointer; position: relative; background-size: cover; image-rendering: pixelated;
            transition: transform 0.1s, border-color 0.1s; background-color: rgba(0,0,0,0.3);
        }
        .inv-slot.selected { border-color: #fff; box-shadow: 0 0 8px white; transform: scale(1.15); z-index: 41; }
        .slot-count {
            position: absolute; bottom: -2px; right: 2px; color: white; font-size: 12px; 
            font-weight: bold; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000;
        }

        /* --- CONTROLS --- */
        .control-layer { position: absolute; bottom: 70px; width: 100%; height: 160px; pointer-events: none; z-index: 20; }
        .d-pad { position: absolute; width: 130px; height: 130px; pointer-events: auto; background: rgba(0,0,0,0.1); border-radius: 50%; }
        .pad-left { left: 20px; bottom: 10px; }
        .pad-right { right: 20px; bottom: 10px; }
        .btn { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 8px; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; position: absolute; cursor: pointer; backdrop-filter: blur(2px); touch-action: manipulation; }
        .btn:active { background: rgba(255, 255, 255, 0.5); }
        .btn-u { top: 0; left: 40px; width: 50px; height: 40px; }
        .btn-d { bottom: 0; left: 40px; width: 50px; height: 40px; }
        .btn-l { top: 40px; left: 0; width: 40px; height: 50px; }
        .btn-r { top: 40px; right: 0; width: 40px; height: 50px; }
        .pad-right .btn { border-color: rgba(255, 215, 0, 0.5); } 
        .actions { position: absolute; bottom: 150px; right: 20px; display: flex; gap: 15px; pointer-events: auto; }
        .btn-act { position: relative; width: 55px; height: 55px; border-radius: 50%; font-size: 10px; }
        .btn-break { background: rgba(255, 50, 50, 0.4); border-color: #ff5555; }
        .btn-build { background: rgba(50, 255, 100, 0.4); border-color: #55ff55; }
        .btn-jump { position: absolute; bottom: 150px; left: 20px; width: 65px; height: 65px; border-radius: 50%; background: rgba(255, 200, 0, 0.4); pointer-events: auto; }
    </style>
</head>
<body>
    <div id="hud">
        <h3>NanoCraft 1.4</h3>
        <button class="menu-btn" onclick="resetWorld()">Reset World</button>
        <div id="save-status">Auto-saving...</div>
    </div>
    <div id="crosshair"></div>

    <div id="inventory"></div>

    <div class="control-layer">
        <div class="btn btn-jump" id="btn-space">JUMP</div>
        <div class="d-pad pad-left">
            <div class="btn btn-u" id="btn-w">W</div>
            <div class="btn btn-l" id="btn-a">A</div>
            <div class="btn btn-r" id="btn-d">D</div>
            <div class="btn btn-d" id="btn-s">S</div>
        </div>
        <div class="actions">
            <div class="btn btn-act btn-break" id="btn-break">BREAK</div>
            <div class="btn btn-act btn-build" id="btn-build">BUILD</div>
        </div>
        <div class="d-pad pad-right">
            <div class="btn btn-u" id="btn-look-u">↑</div>
            <div class="btn btn-l" id="btn-look-l">←</div>
            <div class="btn btn-r" id="btn-look-r">→</div>
            <div class="btn btn-d" id="btn-look-d">↓</div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. MANIFESTS ---
        
        // Standard Blocks
        const BLOCK_MANIFEST = [
            { id: 'grass', color: '#5fab3b', type: 'natural' },
            { id: 'dirt',  color: '#5D4037', type: 'natural' },
            { id: 'stone', color: '#757575', type: 'natural' },
            { id: 'plank', color: '#BC8F8F', type: 'wood' },
            { id: 'brick', color: '#A93226', type: 'brick' },
            { id: 'glass', color: '#88CCFF', type: 'glass' }
        ];

        // Spawn Eggs (New Type)
        const EGG_MANIFEST = [
            { id: 'egg_pig', color: '#FFC0CB', spot: '#DB7093', entity: 'pig' },
            { id: 'egg_zombie', color: '#2E8B57', spot: '#000000', entity: 'zombie' },
            { id: 'egg_enderman', color: '#111111', spot: '#D02090', entity: 'enderman' }
        ];

        const ENTITY_MANIFEST = {
            'zombie': { color: '#2E8B57', speed: 0.03, hp: 20, width: 0.6, height: 1.8, ai: 'chase' },
            'pig':    { color: '#FFC0CB', speed: 0.02, hp: 10, width: 0.8, height: 0.8, ai: 'wander' },
            'enderman': { color: '#000000', speed: 0.1, hp: 40, width: 0.5, height: 2.8, ai: 'wander' }
        };

        // --- 2. TEXTURE GENERATORS ---
        
        // A. Block & Item Textures
        function createTexture(id, type, colorHex, spotColor) {
            const c = document.createElement('canvas');
            c.width = 64; c.height = 64;
            const ctx = c.getContext('2d');
            
            if(type === 'egg') {
                // Draw Egg Shape
                ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.clearRect(0,0,64,64);
                ctx.beginPath();
                ctx.ellipse(32, 32, 20, 28, 0, 0, 2 * Math.PI);
                ctx.fillStyle = colorHex;
                ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = '#333'; ctx.stroke();
                
                // Spots
                ctx.fillStyle = spotColor;
                for(let i=0; i<8; i++) {
                    ctx.beginPath();
                    ctx.arc(20+Math.random()*24, 20+Math.random()*24, 3, 0, 2*Math.PI);
                    ctx.fill();
                }
            } else {
                // Block Patterns
                ctx.fillStyle = colorHex; ctx.fillRect(0,0,64,64);
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                if(type === 'natural') for(let i=0; i<400; i++) ctx.fillRect(Math.random()*64, Math.random()*64, 2, 2);
                else if(type === 'brick') for(let y=0; y<64; y+=16) for(let x=0; x<64; x+=16) ctx.strokeRect(x,y,16,10);
                else if(type === 'wood') for(let y=0; y<64; y+=8) ctx.fillRect(0,y,64,1);
                else if(type === 'glass') { ctx.strokeStyle='white'; ctx.strokeRect(5,5,20,20); ctx.globalAlpha=0.5; }
            }
            
            const tex = new THREE.CanvasTexture(c);
            tex.magFilter = THREE.NearestFilter;
            return { tex, url: c.toDataURL() };
        }

        // B. Entity Face Generator
        function createEntityFace(type) {
            const c = document.createElement('canvas');
            c.width = 64; c.height = 64;
            const ctx = c.getContext('2d');
            
            if(type === 'zombie') {
                ctx.fillStyle = '#2E8B57'; ctx.fillRect(0,0,64,64);
                ctx.fillStyle = '#111'; ctx.fillRect(12, 20, 10, 10); ctx.fillRect(42, 20, 10, 10);
            } else if(type === 'pig') {
                ctx.fillStyle = '#FFC0CB'; ctx.fillRect(0,0,64,64);
                ctx.fillStyle = '#FFF'; ctx.fillRect(8, 20, 12, 12); ctx.fillRect(44, 20, 12, 12);
                ctx.fillStyle = '#000'; ctx.fillRect(12, 24, 4, 4); ctx.fillRect(48, 24, 4, 4);
                ctx.fillStyle = '#DB7093'; ctx.fillRect(20, 36, 24, 14);
                ctx.fillStyle = '#8B4513'; ctx.fillRect(24, 40, 4, 6); ctx.fillRect(36, 40, 4, 6);
            } else if(type === 'enderman') {
                ctx.fillStyle = '#000'; ctx.fillRect(0,0,64,64);
                ctx.fillStyle = '#D02090'; ctx.fillRect(6, 30, 18, 6); ctx.fillRect(40, 30, 18, 6);
            }
            
            const tex = new THREE.CanvasTexture(c);
            tex.magFilter = THREE.NearestFilter;
            return tex;
        }

        // --- 3. ENGINE SETUP ---
        const WORLD_SIZE = 24;
        const CHUNK_CAPACITY = 4000;
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 40);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';
        const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true }); // Alpha for egg transparency
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(50, 100, 50);
        scene.add(ambient, sun);

        // --- 4. ASSETS ---
        const blockMeshes = {};
        const itemMeta = {}; // Textures for UI
        const activePools = {};
        const dummy = new THREE.Object3D();

        // Register Blocks
        BLOCK_MANIFEST.forEach(b => {
            const { tex, url } = createTexture(b.id, b.type, b.color);
            const mat = new THREE.MeshStandardMaterial({ map: tex, transparent: b.type==='glass', opacity: b.type==='glass'?0.6:1 });
            const mesh = new THREE.InstancedMesh(new THREE.BoxGeometry(1,1,1), mat, CHUNK_CAPACITY);
            scene.add(mesh);
            blockMeshes[b.id] = mesh;
            itemMeta[b.id] = { url, type: 'block' };
            activePools[b.id] = 0;
        });

        // Register Eggs (UI Only)
        EGG_MANIFEST.forEach(e => {
            const { url } = createTexture(e.id, 'egg', e.color, e.spot);
            itemMeta[e.id] = { url, type: 'egg', entity: e.entity };
        });

        // --- 5. STATE ---
        const worldData = new Map();
        // Starter Kit
        let playerInventory = { 'brick': 10, 'plank': 10, 'egg_pig': 2, 'egg_zombie': 2 };
        
        // --- 6. SAVE/LOAD ---
        function saveGame() {
            const saveObj = {
                blocks: Array.from(worldData.entries()),
                inventory: playerInventory,
                pos: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
                rot: { x: camera.rotation.x, y: camera.rotation.y }
            };
            localStorage.setItem('nanocraft_14_save', JSON.stringify(saveObj));
            const status = document.getElementById('save-status');
            status.innerText = "Saved!";
            setTimeout(()=> status.innerText = "", 2000);
        }

        function loadGame() {
            const data = localStorage.getItem('nanocraft_14_save');
            if(data) {
                const saveObj = JSON.parse(data);
                playerInventory = saveObj.inventory || {};
                if(saveObj.pos) camera.position.set(saveObj.pos.x, saveObj.pos.y, saveObj.pos.z);
                if(saveObj.rot) { camera.rotation.x = saveObj.rot.x; camera.rotation.y = saveObj.rot.y; }
                
                Object.values(activePools).forEach((_, k) => activePools[k] = 0);
                saveObj.blocks.forEach(([key, val]) => {
                   const [x,y,z] = key.split(',').map(Number);
                   spawnBlockVisual(x, y, z, val.id);
                });
                return true;
            }
            return false;
        }

        window.resetWorld = () => { localStorage.removeItem('nanocraft_14_save'); location.reload(); }
        setInterval(saveGame, 5000);

        // --- 7. INVENTORY UI ---
        const inventoryEl = document.getElementById('inventory');
        let selectedItemId = null;

        function renderInventory() {
            inventoryEl.innerHTML = '';
            const items = Object.keys(playerInventory);
            
            if(items.length === 0) { selectedItemId = null; return; }
            if(!playerInventory[selectedItemId]) selectedItemId = items[0];

            items.forEach(id => {
                if(!itemMeta[id]) return; // Safety check
                const slot = document.createElement('div');
                slot.className = 'inv-slot';
                if(id === selectedItemId) slot.classList.add('selected');
                slot.style.backgroundImage = `url(${itemMeta[id].url})`;
                slot.innerHTML = `<div class="slot-count">${playerInventory[id]}</div>`;
                slot.onclick = () => { selectedItemId = id; renderInventory(); };
                inventoryEl.appendChild(slot);
            });
        }

        function modifyInventory(id, amt) {
            if(!id) return;
            if(!playerInventory[id]) playerInventory[id] = 0;
            playerInventory[id] += amt;
            if(playerInventory[id] <= 0) delete playerInventory[id];
            renderInventory();
        }

        // --- 8. WORLD LOGIC ---
        function spawnBlockVisual(x, y, z, id) {
            const mesh = blockMeshes[id];
            const idx = activePools[id]++;
            if(idx >= CHUNK_CAPACITY) return; 
            dummy.position.set(x, y, z);
            dummy.scale.set(1,1,1);
            dummy.updateMatrix();
            mesh.setMatrixAt(idx, dummy.matrix);
            mesh.instanceMatrix.needsUpdate = true;
            worldData.set(`${x},${y},${z}`, { id, idx });
        }

        function setBlock(x, y, z, id) {
            const key = `${x},${y},${z}`;
            if(worldData.has(key)) { // Break
                const prev = worldData.get(key);
                const pm = blockMeshes[prev.id];
                const mat = new THREE.Matrix4();
                pm.getMatrixAt(prev.idx, mat);
                mat.elements[0]=0; 
                pm.setMatrixAt(prev.idx, mat);
                pm.instanceMatrix.needsUpdate = true;
                worldData.delete(key);
                modifyInventory(prev.id, 1);
            }
            else if(id && playerInventory[id] > 0) { // Build
                spawnBlockVisual(x, y, z, id);
                modifyInventory(id, -1);
            }
        }

        // Init
        if(!loadGame()) {
            for(let x=-WORLD_SIZE/2; x<WORLD_SIZE/2; x++) {
                for(let z=-WORLD_SIZE/2; z<WORLD_SIZE/2; z++) {
                    const h = Math.floor(Math.sin(x*0.2)*2 + Math.cos(z*0.2)*2);
                    spawnBlockVisual(x, h, z, 'grass');
                    spawnBlockVisual(x, h-1, z, 'dirt');
                    spawnBlockVisual(x, h-2, z, 'stone');
                }
            }
        }
        renderInventory();

        // --- 9. ENTITY SYSTEM ---
        const entities = [];
        const entityGeo = new THREE.BoxGeometry(1, 1, 1);

        function spawnEntity(type, x, y, z) {
            const data = ENTITY_MANIFEST[type];
            if(!data) return;

            const faceTex = createEntityFace(type);
            const bodyMat = new THREE.MeshStandardMaterial({ color: data.color });
            const faceMat = new THREE.MeshStandardMaterial({ map: faceTex });
            const materials = [bodyMat, bodyMat, bodyMat, bodyMat, faceMat, bodyMat];
            
            const mesh = new THREE.Mesh(entityGeo, materials);
            mesh.scale.set(data.width, data.height, data.width);
            mesh.position.set(x, y, z);
            scene.add(mesh);

            entities.push({
                mesh: mesh,
                type: type,
                velocity: new THREE.Vector3(0, 0, 0),
                data: data
            });
        }

        function updateEntities() {
            entities.forEach(e => {
                e.velocity.y -= 0.02;
                const nextY = e.mesh.position.y + e.velocity.y;
                const feetY = Math.round(nextY - (e.data.height/2));
                const bx = Math.round(e.mesh.position.x);
                const bz = Math.round(e.mesh.position.z);
                
                if(worldData.has(`${bx},${feetY},${bz}`)) {
                    e.velocity.y = 0;
                    e.mesh.position.y = feetY + 0.5 + (e.data.height/2);
                    e.velocity.x *= 0.8; e.velocity.z *= 0.8;
                } else {
                    e.mesh.position.y = nextY;
                }

                if(Math.random() < 0.02) { 
                    if(e.data.ai === 'wander') {
                        e.velocity.x = (Math.random()-0.5) * e.data.speed * 5;
                        e.velocity.z = (Math.random()-0.5) * e.data.speed * 5;
                        if(Math.random() < 0.3 && e.velocity.y === 0) e.velocity.y = 0.3;
                    } else if(e.data.ai === 'chase') {
                        const dx = camera.position.x - e.mesh.position.x;
                        const dz = camera.position.z - e.mesh.position.z;
                        const dist = Math.sqrt(dx*dx + dz*dz);
                        if(dist < 10) {
                            e.velocity.x = (dx/dist) * e.data.speed;
                            e.velocity.z = (dz/dist) * e.data.speed;
                        }
                    }
                }
                
                e.mesh.position.x += e.velocity.x;
                e.mesh.position.z += e.velocity.z;
                e.mesh.rotation.y = Math.atan2(e.velocity.x, e.velocity.z);
                if(e.mesh.position.y < -20) { e.mesh.position.set(0, 15, 0); e.velocity.set(0,0,0); }
            });
        }

        // --- 10. INTERACTION & LOOP ---
        const input = { w:0, a:0, s:0, d:0, sp:0, lU:0, lD:0, lL:0, lR:0 };
        const bind = (id, k) => {
            const el = document.getElementById(id);
            const on = (e)=>{e.preventDefault(); input[k]=1; el.style.background='rgba(255,255,255,0.5)';};
            const off = (e)=>{e.preventDefault(); input[k]=0; el.style.background='';};
            el.addEventListener('touchstart', on); el.addEventListener('touchend', off);
            el.addEventListener('mousedown', on); el.addEventListener('mouseup', off);
        };
        bind('btn-w','w'); bind('btn-s','s'); bind('btn-a','a'); bind('btn-d','d'); bind('btn-space','sp');
        bind('btn-look-u','lU'); bind('btn-look-d','lD'); bind('btn-look-l','lL'); bind('btn-look-r','lR');

        const raycaster = new THREE.Raycaster();
        const center = new THREE.Vector2(0,0);

        function interact(mode) {
            raycaster.setFromCamera(center, camera);
            const intersects = raycaster.intersectObjects(Object.values(blockMeshes));
            if(intersects.length > 0) {
                const hit = intersects[0];
                const x = Math.round(hit.point.x - hit.face.normal.x*0.1);
                const y = Math.round(hit.point.y - hit.face.normal.y*0.1);
                const z = Math.round(hit.point.z - hit.face.normal.z*0.1);
                
                if(mode === 'break') {
                    setBlock(x, y, z, null);
                } else if(mode === 'build' && selectedItemId) {
                    const meta = itemMeta[selectedItemId];
                    
                    // Logic: Is this an Egg or a Block?
                    if(meta.type === 'egg') {
                        // Spawn Entity
                        const bx = x + hit.face.normal.x;
                        const by = y + hit.face.normal.y;
                        const bz = z + hit.face.normal.z;
                        spawnEntity(meta.entity, bx, by, bz);
                        modifyInventory(selectedItemId, -1);
                    } else {
                        // Place Block
                        const bx = x + hit.face.normal.x;
                        const by = y + hit.face.normal.y;
                        const bz = z + hit.face.normal.z;
                        if(!(Math.abs(bx-camera.position.x)<0.8 && Math.abs(by-camera.position.y+1.5)<1.8 && Math.abs(bz-camera.position.z)<0.8)) {
                            setBlock(bx, by, bz, selectedItemId);
                        }
                    }
                }
            }
        }
        document.getElementById('btn-break').addEventListener('click', ()=>interact('break'));
        document.getElementById('btn-build').addEventListener('click', ()=>interact('build'));
        document.getElementById('btn-break').addEventListener('touchstart', (e)=>{e.preventDefault(); interact('break')});
        document.getElementById('btn-build').addEventListener('touchstart', (e)=>{e.preventDefault(); interact('build')});

        const velocity = new THREE.Vector3();
        
        function animate() {
            requestAnimationFrame(animate);
            updateEntities();
            
            const lookSpeed = 0.04;
            if(input.lL) camera.rotation.y += lookSpeed;
            if(input.lR) camera.rotation.y -= lookSpeed;
            if(input.lU) camera.rotation.x += lookSpeed;
            if(input.lD) camera.rotation.x -= lookSpeed;
            camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));

            const speed = 0.15;
            const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); fwd.y=0; fwd.normalize();
            const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); right.y=0; right.normalize();
            if(input.w) camera.position.add(fwd.multiplyScalar(speed));
            if(input.s) camera.position.add(fwd.multiplyScalar(-speed));
            if(input.a) camera.position.add(right.multiplyScalar(-speed));
            if(input.d) camera.position.add(right.multiplyScalar(speed));

            velocity.y -= 0.025;
            const nextY = camera.position.y + velocity.y;
            const feetX = Math.round(camera.position.x);
            const feetZ = Math.round(camera.position.z);
            const feetY = Math.round(nextY - 1.5);

            if(worldData.has(`${feetX},${feetY},${feetZ}`)) {
                velocity.y = 0;
                camera.position.y = feetY + 0.5 + 1.5;
                if(input.sp) velocity.y = 0.45;
            } else {
                camera.position.y = nextY;
            }
            if(camera.position.y < -20) { camera.position.set(0,20,0); velocity.y=0; }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
