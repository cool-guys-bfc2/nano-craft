<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Processing in PyScript</title>
    <link rel="stylesheet" href="https://pyscript.net">
    <script type="module" src="https://pyscript.net"></script>
    <script defer src="https://pyscript.net/alpha/pyscript.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>

</head>
<body>
    <script type="py>
from js import p5

def setup():
    p5.create_canvas(400, 400)
    p5.background(220)

def draw():
    # p5.mouse_x and p5.mouse_y provide interaction
    p5.fill(p5.random(255), p5.random(255), p5.random(255))
    p5.circle(p5.mouse_x, p5.mouse_y, 50)

p5.setup = setup
p5.draw = draw
p5.run()
    </script>
</body>
</html>
